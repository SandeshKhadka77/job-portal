{% extends 'base.html' %}
{% load static %}

{% block title %}Login - Job Portal{% endblock %}

{% block page_css %}
    <link rel="stylesheet" href="{% static 'css/pages/accounts.css' %}">
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1 class="auth-heading">Welcome Back</h1>
        <p class="auth-subtext">Sign in to your account</p>
        
        <form method="POST" class="form-container">
            {% csrf_token %}
            
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" required class="form-input" placeholder="your@gmail.com">
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" required class="form-input" placeholder="••••••••">
            </div>

            <button type="submit" class="btn btn-primary btn-block">Sign In</button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="{% url 'register' %}">Sign up</a>
        </div>
    </div>
</div>
{% endblock %}
